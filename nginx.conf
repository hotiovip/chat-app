events {}

http {
    server {
        listen 80;
        server_name real-rp-backend.de;

        # Keep this for future automatic background renewals
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Force HTTP to HTTPS conversion
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name real-rp-backend.de;

        # Point precisely to the keys Certbot just created
        ssl_certificate /etc/letsencrypt/live/real-rp-backend.de/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/real-rp-backend.de/privkey.pem;

        # Standard Web Traffic Proxying
        location / {
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # CRITICAL: Keep your real-time STOMP WebSockets working over SSL (WSS)
        location /ws-chat/ {
            proxy_pass http://app:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }
    }
}